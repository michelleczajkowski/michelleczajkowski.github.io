<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Michelle Czajkowski | Curriculum Vitae</title>

  <style>
    @font-face {
      font-family: 'Testimonial';
      src: url('Testimonial.ttf') format('truetype');
      font-display: swap;
    }

    :root {
      --maxw: 980px;
      --text: #111;
      --muted: #555;
      --line: #dddddd;
      --link: #0b57d0;
      --accent: #8b0000;
      --bg: #ffffff;
    }

    html {
      font-size: 15px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Testimonial', Georgia, serif;
      line-height: 1.5;
    }

    .page {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 28px 20px 48px 20px;
    }

    header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 14px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .contact {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .contact span {
      display: inline-block;
      margin-right: 14px;
    }

    h2 {
      margin: 28px 0 10px 0;
      padding-top: 2px;
      font-size: 1.08rem;
      color: var(--accent);
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    p {
      margin: 0 0 10px 0;
    }

    ul {
      margin: 8px 0 0 20px;
      padding: 0;
    }

    li {
      margin: 0 0 7px 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
    }

    .entry {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .entry:last-child {
      border-bottom: 0;
    }

    .role {
      font-weight: 700;
    }

    .org {
      font-style: italic;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 2px;
      margin-bottom: 6px;
    }

    .small {
      font-size: 0.96rem;
    }

    .tagline {
      color: var(--muted);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .skills-list,
    .compact-list {
      margin-left: 18px;
    }

    .compact-list li {
      margin-bottom: 5px;
    }

    footer {
      margin-top: 34px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 820px) {
      .two-col {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      h1 {
        font-size: 1.7rem;
      }
    }
    @media print {
  body {
    font-size: 11pt;
    line-height: 1.4;
  }

  .page {
    padding: 0;
  }

  h2 {
    page-break-after: avoid;
  }

  .entry {
    page-break-inside: avoid;
  }

  a {
    text-decoration: none;
    color: black;
  }
  @media print {
  @page {
    size: A4;
    margin: 12mm;
  }

  body {
    font-size: 10.5pt;
    line-height: 1.35;
  }

  .page {
    max-width: none;
    padding: 0;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 20px;
  }

  .entry {
    page-break-inside: avoid;
    break-inside: avoid;
  }

  h2 {
    page-break-after: avoid;
    break-after: avoid;
  }

  a {
    color: black;
    text-decoration: none;
  }
}
}
  </style>
</head>
